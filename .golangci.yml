version: "2"
run:
  timeout: 5m

formatters:
  enable:
    - goimports

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - misspell
    - revive
    - gosec
    - unconvert
    - gocritic

  settings:
    revive:
      rules:
        - name: exported
          arguments:
            - disableStutteringCheck
    gosec:
      excludes:
        - G304  # File path from variable is expected for a CLI tool
        - G104  # Unhandled errors in flag.Parse (ExitOnError guarantees no-error)
    errcheck:
      exclude-functions:
        - fmt.Println
        - fmt.Printf
        - fmt.Fprintf
        - fmt.Fprintln
        - (io.Writer).Write
        - (io.Closer).Close
        - (*os.File).Close
        - (*net/http.Response).Body.Close
        - (*mime/multipart.Writer).Close
        - (*encoding/json.Encoder).Encode
        - (*encoding/json.Decoder).Decode
        - (http.ResponseWriter).Write
        - (net/http.ResponseWriter).Write

  exclusions:
    rules:
      - path: "_test\\.go"
        linters:
          - gosec
          - errcheck
          - gocritic
          - revive
